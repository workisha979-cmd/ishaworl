<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modern Kanban Board</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <h1>🚀 My Kanban Board</h1>

  <div class="board">

    <div class="column">
      <h2>To Do</h2>
      <div class="task-list" data-status="todo"></div>
      <div class="add-task">
        <input type="text" placeholder="New task..." id="todo-input"/>
        <button onclick="addTask('todo')">Add</button>
      </div>
    </div>

    <div class="column">
      <h2>In Progress</h2>
      <div class="task-list" data-status="inprogress"></div>
      <div class="add-task">
        <input type="text" placeholder="New task..." id="inprogress-input"/>
        <button onclick="addTask('inprogress')">Add</button>
      </div>
    </div>

    <div class="column">
      <h2>Done</h2>
      <div class="task-list" data-status="done"></div>
      <div class="add-task">
        <input type="text" placeholder="New task..." id="done-input"/>
        <button onclick="addTask('done')">Add</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
